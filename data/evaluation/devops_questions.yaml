# ADVERSARIAL PARAPHRASE (devops-para-001a/b/c)
# Three phrasings of the same question — all should return the same top chunk.
# Tests embedding model robustness to vocabulary variation.
# ---------------------------------------------------------------------------

- id: devops-para-001a
  question: "How do Docker secrets work?"
  domain: devops
  category: adversarial_paraphrase
  failure_mode: vocabulary_mismatch
  paraphrase_group: docker-secrets-mechanism
  expected_source: "dockerdeepdive.pdf"
  expected_chunk_contains:
    - "secrets"
  no_answer: false
  requires_graph: false
  requires_multi_source: false
  notes: >
    Paraphrase group anchor. Verified: the secrets MECHANISM (encrypted
    cluster store, in-memory mount) is Deep Dive ch16; the Compose book
    covers Compose secrets usage, not the mechanism.

- id: devops-para-001b
  question: "What is the mechanism for passing sensitive data to containers securely?"
  domain: devops
  category: adversarial_paraphrase
  failure_mode: vocabulary_mismatch
  paraphrase_group: docker-secrets-mechanism
  expected_source: "dockerdeepdive.pdf"
  expected_chunk_contains:
    - "secrets"
  no_answer: false
  requires_graph: false
  requires_multi_source: false
  notes: "Paraphrase — no Docker keyword, describes the function not the feature."

- id: devops-para-001c
  question: "Explain Docker's secret management system and how it differs from environment variables."
  domain: devops
  category: adversarial_paraphrase
  failure_mode: vocabulary_mismatch
  paraphrase_group: docker-secrets-mechanism
  expected_source: "dockerdeepdive.pdf"
  expected_chunk_contains:
    - "secrets"
  no_answer: false
  requires_graph: false
  requires_multi_source: false
  notes: >
    Paraphrase — adds comparison framing. If this returns different top
