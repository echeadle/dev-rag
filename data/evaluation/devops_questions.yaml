# ---------------------------------------------------------------------------
# ARCHITECTURE (devops-022)
# Rounds out to 25 questions — decision-support content.
# ---------------------------------------------------------------------------

- id: devops-022
  question: "What are the tradeoffs between running one process per container versus multiple processes in a single container?"
  domain: devops
  category: architecture
  failure_mode: description_vs_decision_support
  expected_source: null
  expected_chunk_contains: []
  no_answer: false
  requires_graph: false
  requires_multi_source: false
  notes: >
    Classic Docker design question with a nuanced answer — one process per
    container is the convention but not an absolute rule. Tests whether
    the corpus returns decision-support guidance rather than just the
    "one process per container" rule without explanation.

- id: devops-023
  question: "What is the difference between ENTRYPOINT and CMD in a Dockerfile and how do they interact when both are specified?"
  domain: devops
  category: comparison
  failure_mode: single_concept_bias
  expected_source: null
  expected_chunk_contains:
    - "ENTRYPOINT"
    - "CMD"
  no_answer: false
  requires_graph: false
  requires_multi_source: false
  notes: >
    Classic Docker question with a subtle answer — CMD provides default
    arguments that can be overridden at runtime, ENTRYPOINT sets the
    executable that always runs. The interaction when both are specified
    (CMD becomes arguments to ENTRYPOINT) is where tutorials often fall
    short. Tests whether the corpus returns the complete nuanced explanation.

