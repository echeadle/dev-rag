  domain: devops
  category: chunk_boundary
  failure_mode: chunker_splits_procedure
  expected_source: null
  expected_chunk_contains:
    - "docker build"
    - "docker push"
  no_answer: false
  requires_graph: false
  requires_multi_source: false
  notes: >
    Three-step procedure (build, tag, push) that may be split across chunks.
    If the top result contains docker build but not docker push, the chunker
    split the procedure and chunk_size or overlap needs to increase.

